<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Transaction - Finance Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Finance Tracker</a>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="add-transaction.html" class="active">Add</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="reports.html">Reports</a></li>
      <li><a href="assistant.html">AI Assistant</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="section-header">
      <h2>Add Transaction</h2>
      <a href="history.html" class="btn btn-outline btn-sm">View History</a>
    </div>

    <div class="card">
      <div id="alert-box"></div>

      <div class="type-toggle">
        <button class="btn btn-primary active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
        <button class="btn btn-outline" id="btn-income" onclick="setType('income')">Income</button>
      </div>

      <form id="tx-form">
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Lunch, Salary, Uber" required />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" min="1" step="any" placeholder="0" required />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
            <optgroup label="Expenses" id="expense-cats">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Rent">Rent</option>
              <option value="Shopping">Shopping</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Utilities">Utilities</option>
              <option value="Health">Health</option>
              <option value="Education">Education</option>
              <option value="Other Expense">Other Expense</option>
            </optgroup>
            <optgroup label="Income" id="income-cats" style="display:none">
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Business">Business</option>
              <option value="Investment">Investment</option>
              <option value="Gift">Gift</option>
              <option value="Other Income">Other Income</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">
          Add Transaction
        </button>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    const settings = getSettings();
    if (settings.darkMode) document.documentElement.setAttribute("data-theme", "dark");

    let currentType = "expense";

    document.getElementById("date").valueAsDate = new Date();

    function setType(type) {
      currentType = type;
      const expBtn = document.getElementById("btn-expense");
      const incBtn = document.getElementById("btn-income");
      const expCats = document.getElementById("expense-cats");
      const incCats = document.getElementById("income-cats");
      const category = document.getElementById("category");

      if (type === "expense") {
        expBtn.className = "btn btn-primary active-expense";
        incBtn.className = "btn btn-outline";
        expCats.style.display = "";
        incCats.style.display = "none";
      } else {
        incBtn.className = "btn btn-primary active-income";
        expBtn.className = "btn btn-outline";
        incCats.style.display = "";
        expCats.style.display = "none";
      }
      category.value = "";
    }

    document.getElementById("tx-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const description = document.getElementById("description").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      const category = document.getElementById("category").value;
      const date = document.getElementById("date").value;

      if (!description || !amount || !category || !date) return;

      addTransaction({ description, amount, type: currentType, category, date });

      document.getElementById("alert-box").innerHTML =
        '<div class="alert alert-success">Transaction added successfully!</div>';

      document.getElementById("description").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("category").value = "";
      document.getElementById("date").valueAsDate = new Date();

      setTimeout(() => { document.getElementById("alert-box").innerHTML = ""; }, 3000);
    });
  </script>
</body>
</html>
